# Guition ESP32-S3-4848S040 480px X 480px Smart Screen
# Local override for panels that showed flicker/banding and blank screen after OTA.
# Based on the framework hardware file but uses the explicit st7701s configuration
# and a higher backlight PWM frequency.
# Keep this file separate from hardware/ so upstream hardware changes can be
# merged safely and reviewed against this known-good local variant.
# Exact symptoms that motivated this override: visible flicker/banding on some
# panels and blank screen after OTA reboot until a full power cycle.
---
substitutions:
  screen_height: 480
  screen_width: 480
  display_backlight_pwm_frequency: 1200Hz
  display_backlight_gamma: "1.2"

esphome:
  min_version: 2026.5.0
  project:
    name: "Guition.ESP32-S3-4848S040"
    version: "1.0"

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  hardware_uart: UART0

output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: ${display_backlight_pwm_frequency}

switch:
  - platform: gpio
    id: internal_relay_1
    pin: GPIO40
  - platform: gpio
    id: internal_relay_2
    pin: GPIO02
  - platform: gpio
    id: internal_relay_3
    pin: GPIO01

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    gamma_correct: ${display_backlight_gamma}
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda:
      number: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

touchscreen:
  platform: gt911
  id: my_touchscreen
  display: my_display
  i2c_id: bus_a
  on_release:
    then:
      - script.execute: screen_interaction_started
      - if:
          condition:
            lambda: 'return !id(display_backlight).current_values.is_on();'
          then:
            - logger.log:
                level: INFO
                format: "Touch detected while backlight was off - restoring display backlight"
            - light.turn_on: display_backlight

lvgl:
  rotation: ${rotation | default("0")}

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: st7701s
    id: my_display
    update_interval: never
    auto_clear_enabled: false
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    dimensions:
      width: 480
      height: 480
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red:
        - 11
        - 12
        - 13
        - 14
        - 0
      green:
        - 8
        - 20
        - 3
        - 46
        - 9
        - 10
      blue:
        - 4
        - 5
        - 6
        - 7
        - 15