---
# Local override of common/backlight_time.yaml.
# Intended behavioral difference from the framework file: on idle timeout,
# return to clock_page instead of blanking or pausing the display.
# Everything else in this file should be kept aligned with the framework file.
# ═══════════════════════════════════════════════════════════════════════════════
# BACKLIGHT TIME CONTROL
# ═══════════════════════════════════════════════════════════════════════════════
# Controls display brightness based on sun position and time of day.
#
# Optional substitutions (defaults provided below):
#   display_daytime_brightness: "100"
#   display_nighttime_brightness: "50"
#   display_night_hour: "0"      # Hour for night mode (0-23)
#   display_night_minute: "0"    # Minute for night mode (0-59)
#   display_backlight_timeout_initial: "10"  # Initial backlight timeout in minutes (-1 to disable)
#
# Backlight settings are exposed at runtime through template number entities on
# the device web interface and in Home Assistant.
#
# Modes:
#   Day     - After sunrise, full brightness
#   Evening - After sunset, reduced brightness
#   Night   - After night hour, reduced brightness
# ═══════════════════════════════════════════════════════════════════════════════

# Default values for backlight control - can be overridden in main YAML file
# and are used as the initial values for the runtime-configurable entities.
substitutions:
  display_daytime_brightness: "100"
  display_nighttime_brightness: "50"
  display_night_hour: "0"
  display_night_minute: "0"
  display_backlight_timeout_initial: ".12"

globals:
  - id: boot_restart_published
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_screen_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

sun:
  latitude: !secret latitude
  longitude: !secret longitude
  on_sunset:
    - elevation: -3.5°
      then:
        - select.set:
            id: brightness_mode
            option: "Evening"
  on_sunrise:
    - then:
        - select.set:
            id: brightness_mode
            option: "Day"

number:
  - platform: template
    id: display_backlight_timeout
    name: Backlight timeout
    icon: "mdi:timer-outline"
    optimistic: true
    unit_of_measurement: "min"
    initial_value: ${display_backlight_timeout_initial}
    restore_value: true
    min_value: -1
    max_value: 720
    step: 1
    mode: box

  - platform: template
    id: display_daytime_brightness_pct
    name: Display daytime brightness
    icon: mdi:brightness-7
    optimistic: true
    unit_of_measurement: "%"
    initial_value: ${display_daytime_brightness}
    restore_value: true
    min_value: 0
    max_value: 100
    step: 1
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(brightness_mode).current_option() == "Day";'
            then:
              - script.execute: apply_brightness_mode

  - platform: template
    id: display_nighttime_brightness_pct
    name: Display nighttime brightness
    icon: mdi:brightness-4
    optimistic: true
    unit_of_measurement: "%"
    initial_value: ${display_nighttime_brightness}
    restore_value: true
    min_value: 0
    max_value: 100
    step: 1
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(brightness_mode).current_option() != "Day";'
            then:
              - script.execute: apply_brightness_mode

  - platform: template
    id: display_night_hour_runtime
    name: Display night hour
    icon: mdi:clock-outline
    optimistic: true
    initial_value: ${display_night_hour}
    restore_value: true
    min_value: 0
    max_value: 23
    step: 1
    mode: box
    on_value:
      then:
        - script.execute: sync_brightness_mode_by_time

  - platform: template
    id: display_night_minute_runtime
    name: Display night minute
    icon: mdi:clock-outline
    optimistic: true
    initial_value: ${display_night_minute}
    restore_value: true
    min_value: 0
    max_value: 59
    step: 1
    mode: box
    on_value:
      then:
        - script.execute: sync_brightness_mode_by_time

light:
  - id: !extend display_backlight
    on_turn_on:
      - lvgl.resume:

  # You can set the display_backlight to on via HomeAssistant to turn on the display
  # Please note, that the display will again turn off, after display_backlight_timeout has expired.
  # To keep the display awake, you need to set display_backlight_timeout to -1, then
  # reset the display_backlight_timeout when the turn on event is cleared (e.g. motion sensor does
  # not detect motion)

time:
  - platform: homeassistant
    id: system_time
    on_time_sync:
      - script.execute: time_update

      # Update last restart time (only once, on first sync after boot)
      - if:
          condition:
            lambda: 'return id(boot_restart_published) == false;'
          then:
            - lambda: 'id(boot_restart_published) = true;'
            - text_sensor.template.publish:
                id: device_last_restart
                state: !lambda 'return id(system_time).now().strftime("%a %d %b %Y - %I:%M:%S %p");'
            - logger.log:
                level: INFO
                format: "Setting brightness mode on boot"
            - script.execute: sync_brightness_mode_by_time

    on_time:
      # Update time display and refresh the runtime brightness schedule every minute.
      - seconds: 0
        minutes: '*'
        then:
          - script.execute: time_update
          - script.execute: sync_brightness_mode_by_time

interval:
  - interval: 15s
    then:
      - if:
          condition:
            lambda: |-
              const float timeout_min = id(display_backlight_timeout).state;
              if (timeout_min < 0) {
                return false;
              }

              const uint32_t now_ms = millis();
              if (id(last_screen_interaction_ms) == 0) {
                id(last_screen_interaction_ms) = now_ms;
                return false;
              }

              const uint32_t timeout_ms = (uint32_t) (timeout_min * 60000.0f);
              if ((uint32_t) (now_ms - id(last_screen_interaction_ms)) < timeout_ms) {
                return false;
              }

              return true;
          then:
            - logger.log:
                level: INFO
                format: "Touch idle timeout reached - returning to clock page"
            - lambda: 'id(last_screen_interaction_ms) = millis();'
            - lvgl.page.show:
                id: clock_page

lvgl:
  on_resume:
    then:
      - logger.log:
          level: INFO
          format: "LVGL resumed - restoring backlight"
      - script.execute: apply_brightness_mode

select:
  - platform: template
    name: "Brightness mode"
    id: brightness_mode
    icon: mdi:television-shimmer
    optimistic: true
    options:
      - Day
      - Evening
      - Night
    initial_option: Day
    on_value:
      then:
        - lvgl.resume
        - lvgl.widget.redraw
        - script.execute: apply_brightness_mode

script:
  - id: !extend screen_interaction_started
    then:
      - lambda: 'id(last_screen_interaction_ms) = millis();'

  # ─────────────────────────────────────────────────────────────────────────────
  # Apply brightness based on current mode
  # ─────────────────────────────────────────────────────────────────────────────
  - id: apply_brightness_mode
    then:
      - if:
          condition:
            lambda: 'return id(brightness_mode).current_option() == "Day";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(display_daytime_brightness_pct).state / 100.0f;'
      - if:
          condition:
            lambda: 'return id(brightness_mode).current_option() == "Evening";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(display_nighttime_brightness_pct).state / 100.0f;'
      - if:
          condition:
            lambda: 'return id(brightness_mode).current_option() == "Night";'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(display_nighttime_brightness_pct).state / 100.0f;'

  # ─────────────────────────────────────────────────────────────────────────────
  # Set brightness mode based on sun position and runtime-configurable night time
  # Logic:
  #   - Sun above horizon → Day
  #   - Sun below horizon + time >= night_hour → Night
  #   - Sun below horizon + time < night_hour → Evening
  # Note: Early morning (before sunrise) sun is down, but we've already passed
  #       night_hour from the previous day, so it remains Night until sunrise.
  # ─────────────────────────────────────────────────────────────────────────────
  - id: sync_brightness_mode_by_time
    then:
      - if:
          condition:
            sun.is_above_horizon:
          then:
            - logger.log:
                level: INFO
                format: "Boot: Sun is up - Day mode"
            - select.set:
                id: brightness_mode
                option: "Day"
          else:
            # Sun is down - determine Evening vs Night based on time
            - if:
                condition:
                  lambda: |-
                    auto now = id(system_time).now();
                    int current = now.hour * 60 + now.minute;
                    int night_hour = (int) id(display_night_hour_runtime).state;
                    int night_minute = (int) id(display_night_minute_runtime).state;
                    int night = night_hour * 60 + night_minute;
                    // Special case: if night_hour is midnight (0), use AM/PM as divider
                    // Evening = PM hours (12-23), Night = AM hours (0-11)
                    if (night == 0) {
                      return now.hour < 12;
                    }
                    // Otherwise: Night if past night_hour OR early morning (crossed midnight)
                    return current >= night || now.hour < 12;
                then:
                  - logger.log:
                      level: INFO
                      format: "Boot: Night mode"
                  - select.set:
                      id: brightness_mode
                      option: "Night"
                else:
                  - logger.log:
                      level: INFO
                      format: "Boot: Evening mode"
                  - select.set:
                      id: brightness_mode
                      option: "Evening"